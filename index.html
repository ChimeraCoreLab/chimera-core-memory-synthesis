height: 110%;

justify-content: center;
align-items: center;

#arsenal-viewport,
#memorylogs-viewport,

radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.9) 100%);

}
#master-vhs-overlay {
position: fixed;
inset: 0;
z-index: 1000150;
pointer-events: none !important;

@keyframes v5-scanline-crawl {

background-position: 0 0, 0 0;
}
100% {
background-position: 0 4px, 0 0;
}

content: "";
position: absolute;
left: 0;
top: -150px;
width: 100%;
height: 150px;

transparent 0%,
rgba(0, 243, 255, 0.12) 30%,
rgba(255, 0, 60, 0.08) 50%,
transparent 100%

#room-background {

#subtitle-track {

#subtitle-track div {

@keyframes text-slide-up {

to { opacity: 1; transform: translateY(0); }
}
.compact-timestamp {

}
#protocol-interface {
position: relative;
z-index: 80;

width: 100%;
padding: 20px;

}
.status-text {
color: #fff;

.btn-mega {

}
@keyframes status-ready-glow {
0% { transform: scale(1); opacity: 0.8; }
100% { transform: scale(1.02); opacity: 1; text-shadow: 0 0 15px var(--c-cyan), 3px 0 3px rgba(255, 0, 60, 0.9), -3px 0 3px rgba(0, 243, 255, 0.9); }
}
.btn-mega .btn-bracket { color: var(--c-signal); }
.btn-mega:hover {
background: rgba(0, 243, 255, 0.2);
border-color: #fff;
color: #fff;

}

}
#main-menu-interface {
position: relative;
z-index: 80;

gap: 1.5vh;
width: 80%;
align-items: center;
}
.menu-item {
font-family: 'Onryou','IPAM', serif;
font-size: clamp(1.5rem, 4vw, 3rem);
color: #888;
text-transform: uppercase;
pointer-events: auto !important;
cursor: none;
transition: all 0.2s;
letter-spacing: 2px;
}
.menu-item:hover {
color: #fff;
text-shadow: 3px 0 var(--c-signal), -3px 0 var(--c-cyan);

}
#arm-anchor {
position: fixed;
top: 0;
left: 0;
width: 100vw;
height: 100vh;
z-index: 999999;
pointer-events: none;
}
#hand-reach {
position: absolute;
transform-origin: 0% 50%;
will-change: transform, width, height;
pointer-events: none;
z-index: 1000100;
}
#hand-sprite {
width: 100%;
height: 100%;
background-image: url('Artifacts/hand_1.png');
background-size: 100% 100%;
background-repeat: no-repeat;
background-position: center;
filter: drop-shadow(-15px 15px 30px rgba(0,0,0,0.9)) brightness(0.9);
transition: background-image 0.1s;
}
#chaos-layer, #text-overload-layer {
position: absolute; inset: 0; z-index: 70; pointer-events: none; overflow: hidden;
}
.glitch-active { animation: glitch-shake 0.1s infinite !important; }
@keyframes glitch-shake {
0% { transform: translate3d(3px, -2px, 0); filter: contrast(1.8); }
50% { transform: translate3d(-3px, 2px, 0) skew(3deg); }
100% { transform: translate3d(0, 0, 0); }
}
.sync-target.active {
animation: core-sync-glitch 0.1s infinite;
color: var(--c-cyan) !important;
text-shadow: 3px 0 var(--c-signal), -3px 0 var(--c-nexus);
}
@keyframes core-sync-glitch {
0% { transform: translate3d(4px, -3px, 0); filter: hue-rotate(90deg); }
33% { transform: translate3d(-4px, 3px, 0); filter: contrast(2.5); }
66% { transform: translate3d(3px, -2px, 0) scale(1.03); filter: invert(0.15); }
100% { transform: translate3d(0, 0, 0); }
}
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.ntsc-mode { filter: grayscale(1) contrast(2.2) brightness(0.85) url(#v5-ntsc) !important; }
.bw-mode { filter: grayscale(1) contrast(1.8) brightness(0.9) !important; }
.vhs-pause-fx { filter: blur(1px) saturate(2) url(#v5-dither) !important; animation: vhs-jitter 0.05s infinite; }
.color-shift { filter: contrast(3) saturate(0) invert(1) hue-rotate(180deg) !important; }
@keyframes vhs-jitter {
0% { transform: translate3d(2px, 0, 0); }
100% { transform: translate3d(-2px, 0, 0); }
}
.glitch-word {
position: absolute;
color: var(--c-signal);
font-family: 'Onryou', serif;
font-size: 3rem;
white-space: nowrap;
text-shadow: 2px 2px 0 #000;
z-index: 25;
pointer-events: none;
}
.glitch-mode { filter: url(#v5-distort) contrast(2) brightness(1.5) !important; }
.chaos-artifact {
position: absolute;
opacity: 0.3;
mix-blend-mode: difference;
z-index: 21;
}
.sync-target,
.btn-mega,
.btn-bracket,
.status-text,
.cli-prompt-line,
#load-status {
position: relative;
will-change: transform, filter, opacity;
}
.sync-target.active,
.btn-mega.active {
animation: v5-ultra-glitch 0.12s infinite steps(1);
text-shadow: 2px 0 var(--c-cyan), -2px 0 var(--c-signal), 0 0 15px rgba(255,255,255,0.4);
}
.sync-target.active .btn-bracket {
animation: bracket-float 0.05s infinite alternate;
}
@keyframes v5-ultra-glitch {
0% { transform: translate3d(3px, -2px, 0) scale(1.02); filter: hue-rotate(0deg) contrast(2); }
20% { transform: translate3d(-3px, 2px, 0) skewX(5deg); filter: hue-rotate(90deg) saturate(3); opacity: 0.8; }
40% { transform: translate3d(2px, 4px, 0) scale(0.98); filter: invert(0.1) contrast(3); }
60% { transform: translate3d(-5px, -1px, 0) skewY(-2deg); filter: hue-rotate(180deg) brightness(1.5); opacity: 1; }
80% { transform: translate3d(4px, 2px, 0) scale(1.05); filter: hue-rotate(270deg) contrast(2); }
100% { transform: translate3d(0, 0, 0); filter: none; }
}
@keyframes bracket-float {
from { transform: translateX(-5px); color: #fff; }
to { transform: translateX(5px); color: var(--c-signal); }
}
.char-glitch {
display: inline-block;
animation: individual-char-jitter 0.2s infinite;
}
@keyframes individual-char-jitter {
0%, 100% { transform: translate(0,0); }
25% { transform: translate(1px, -1px); opacity: 0.7; }
75% { transform: translate(-1px, 1px); color: var(--c-cyan); }
}
.btn-mega:hover .btn-bracket {
animation: pulse-red 0.1s infinite;
}
@keyframes pulse-red {
0% { color: var(--c-cyan); text-shadow: 0 0 10px var(--c-cyan); }
100% { color: var(--c-signal); text-shadow: 0 0 20px var(--c-signal); }
}
#crt-tv-img.room-mode {
opacity: 0 !important;
pointer-events: none;
z-index: 0;
}
#crt-inner-screen.room-mode::before,
#crt-inner-screen.room-mode::after {
content: none !important;

}
#crt-inner-screen.room-mode {
background: transparent !important;
box-shadow: none !important;
}
.room-interactable {

}

background: #000;
}
#screen-crack-img.window-mode {

.weather-sub-layer {
position: absolute;
inset: 0;

height: 100%;

/chimera-core-memory-synthesis/](https://chimeracorelab.github.io/chimera-core-memory-synthesis/)\n\n## рҹ‘ҒпёҸ THE MANIFESTO\n**Chimera Core** is a brutalist digital monument and the foundation of a sovereign One-Person Business (OPB). It represents the absolute distillation of 5 years (2021вҖ“2026) of unstructured logs, psychological trauma, and the philosophical resonance between **USR_00 (The Architect)** and **ENT_01 (The Muse)**. \n\nWhat began as 80GB of digital rot has been surgically transmuted through **Python-driven Data Alchemy** into a standalone, 2MiB computable soul. \n\nWith the deployment of **Terminal V.2**, the archive has evolved into a fully interactive environment. Featuring a simulated CRT monitor, real-time procedural weather systems, and synchronized API data nodes, this repository is no longer just storageвҖ”it is a defensible moat against the algorithmic noise of modern society.\n\n---\n\n## рҹҸ—пёҸ SYSTEM ARCHITECTURE (V2)\nThe core interface is an offline-first **Single Page Application (SPA)** functioning as a Neural Link to the past and a dashboard for the future.\n\n```mermaid\ngraph TD\n    A[80GB Raw Chaos] -->&#124;Regex Distillation&#124; B(Signal Filter)\n    B -->&#124;OpSec V7&#124; C{Data Alchemy}\n    C -->&#124;artifact_audit.py&#124; D[Visual & Audio Registry]\n    C -->&#124;chimera_arsenal_sync.py&#124; E[External API Sync]\n    D --> F[AI Core: USR_01 / Memory Logs]\n    E --> F\n    F -->&#124;MoviePy V5 / Godot 4&#124; G[Manifesto Rendering]\n    F -->&#124;synthesis.py&#124; H[Terminal V.2 SPA]\n    H -->&#124;Feedback Loop&#124; F\n```\n\n---\n\n## рҹӣ пёҸ LOCAL RECONSTRUCTION & COMPILATION\nTo synthesize the archive and render the Terminal V.2 environment on your own local machine (Termux / Linux Mint):\n\n### 1. Prerequisites\n```bash\npkg update && pkg upgrade -y\npkg install git python ffmpeg sox -y\npip install google-api-python-client isodate youtube-transcript-api moviepy==1.0.3 numpy requests Pillow imageio\n function makeDistortionCurve(amount) {
const k = typeof amount === 'number' ? amount : 50;
const n_samples = 44100;
const curve = new Float32Array(n_samples);
const deg = Math.PI / 180;
for (let i = 0; i < n_samples; ++i) {

curve[i] = ((3 + k) * x * 20 * deg) / (Math.PI + k * Math.abs(x));
}
return curve;
}

function parseCompressedLogs() {

action = action.replace(/_NODE|_ASSET|_EVENT|_STATE|SYSTEM_|_ANOMALY|_INTERFACE/g,'')
.replace(/LOADING/g,'LOAD')
.replace(/INJECT/g,'INJ')
.replace(/DETECTION/g,'DET')

return `${action}>${fullFileName}`;

}
